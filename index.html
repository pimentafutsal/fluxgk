<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>FluxGK</title>

<!-- ÍCONE E COMPORTAMENTO DE APP
     apple-touch-icon: o que o iPad/iPhone usa em "Adicionar à Tela de Início".
     Sem ele, o Safari inventa um ícone com a inicial do site.
     As linhas web-app fazem abrir em tela cheia, sem a barra do Safari. -->
<link rel="apple-touch-icon" sizes="180x180" href="icone-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icone-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FluxGK">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0a0a0a;--paper:#fafaf7;--mute:#737373;--faint:#e5e5e5;--green:#16a34a;--red:#dc2626;--amber:#E8901A}
html,body{height:100%;background:#0a0a0a;font-family:'Space Grotesk',sans-serif;overflow:hidden}
.screen{display:none;height:100%;flex-direction:column}
.screen.active{display:flex}

/* ---------- LOADING ---------- */
#scr-loading{background:#0a0a0a;align-items:center;justify-content:center;position:fixed;inset:0;z-index:9999}
#scr-loading.active{display:flex}
.ldots{display:flex;gap:6px}
.ldots i{width:7px;height:7px;border-radius:50%;background:#3a3a3a;animation:bl 1.2s infinite}
.ldots i:nth-child(2){animation-delay:.2s}.ldots i:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* ---------- LOGIN ---------- */
#scr-login{background:#0a0a0a;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.lwrap{width:100%;max-width:380px}
.llogo{text-align:center;margin-bottom:28px}
.lbrand{font-size:30px;font-weight:700;color:#fafaf7;letter-spacing:-.02em}
.lsub{font-size:11px;color:#8a8a8a;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.lcard{background:#111;border:1px solid #1f1f1f;border-radius:14px;padding:26px}
.lt{font-size:17px;font-weight:700;color:#fafaf7;margin-bottom:2px}
.lts{font-size:11px;color:#8a8a8a;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}
.lf{margin-bottom:14px}
.ll{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:#8a8a8a;display:block;margin-bottom:6px}
.li{width:100%;padding:12px 13px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;color:#fafaf7;font-size:14px;font-family:'Space Grotesk',sans-serif}
.li:focus{outline:none;border-color:#E8901A}
.li::placeholder{color:#878787}
.lrem{display:flex;align-items:center;gap:8px;margin:16px 0}
.lrem input{width:15px;height:15px;accent-color:#fafaf7}
.lrem span{font-size:12px;color:#8a8a8a;font-family:'JetBrains Mono',monospace}
.lerr{font-size:12px;font-family:'JetBrains Mono',monospace;color:#f87171;text-align:center;min-height:16px;margin-bottom:8px}
.lbtn{width:100%;padding:13px;background:#fafaf7;color:#0a0a0a;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.lbtn:disabled{opacity:.5;cursor:default}
.lfooter{margin-top:24px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#7d7d7d;text-align:center;letter-spacing:.06em}

/* ---------- HOME ---------- */
#scr-home{background:var(--paper)}
.hnav{height:56px;display:flex;align-items:center;padding:0 16px;gap:11px;background:#0a0a0a;flex-shrink:0}
.hbadge{width:32px;height:32px;border-radius:7px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12)}
.hbadge img{width:100%;height:100%;object-fit:contain}
.hbph{font-size:11px;font-weight:700;color:rgba(255,255,255,.85);font-family:'JetBrains Mono',monospace}
.hct{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.hcname{font-size:14px;font-weight:700;color:rgba(255,255,255,.95);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcseas{font-size:10px;color:rgba(255,255,255,.5);font-family:'JetBrains Mono',monospace;letter-spacing:.06em}
.hnr{display:flex;align-items:center;gap:10px;margin-left:auto}
.hswap{height:40px;padding:0 12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);border-radius:10px;color:rgba(255,255,255,.85);font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;gap:6px;position:relative}
.hswap::after{content:'';position:absolute;inset:-2px}
.hswap:hover{background:rgba(255,255,255,.12)}
.hnbtn{width:40px;height:40px;border:none;background:rgba(255,255,255,.08);border-radius:10px;cursor:pointer;color:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;position:relative}
.hnbtn::after{content:'';position:absolute;inset:-2px}
.hnbtn svg{width:19px;height:19px}
.hudot{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.85);cursor:pointer;font-family:'Space Grotesk',sans-serif;position:relative}
.hudot::after{content:'';position:absolute;inset:-2px}
.hbody{flex:1;overflow-y:auto;padding:22px 16px 40px}
.hgreet{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.hgsub{font-size:12px;color:var(--mute);font-family:'JetBrains Mono',monospace;margin-top:3px;margin-bottom:20px}
.hstats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:24px}
.hst{background:#fff;border:1px solid var(--faint);border-radius:11px;padding:13px}
.hsv{font-size:21px;font-weight:700;color:var(--ink);font-family:'JetBrains Mono',monospace}
.hsl{font-size:9px;color:var(--mute);font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.mgrid{display:grid;gap:9px}

/* ---------- LARGURA: notebook + iPad ----------
   O hub nasceu para celular e esticava ate a borda no monitor.
   Aqui limitamos e centralizamos o conteudo, sem mexer no HTML.
   Referencias: iPad retrato ~810px · iPad paisagem ~1080px · notebook ~1440px */
:root{--maxw:960px}
.hbody>*{max-width:var(--maxw);margin-left:auto;margin-right:auto}
/* a barra escura segue de ponta a ponta; so o conteudo dela alinha com o corpo */
.hnav{padding:0}
.hnav>*:first-child{margin-left:max(16px,calc((100% - var(--maxw))/2))}
.hnav>*:last-child{margin-right:max(16px,calc((100% - var(--maxw))/2))}
/* cards dos modulos: 1 coluna no celular, 2 a partir do iPad retrato */
@media(min-width:680px){
  .mgrid{grid-template-columns:1fr 1fr;gap:11px}
  .hbody{padding-left:24px;padding-right:24px}
}
/* barra do modulo alinhada com o mesmo limite */
.mtbar{padding:0}
.mtbar>*:first-child{margin-left:max(13px,calc((100% - var(--maxw))/2))}
.langrow{display:flex;align-items:center;justify-content:space-between;margin-top:22px;padding-top:16px;border-top:1px solid var(--faint)}
.langlbl{font-size:9px;color:var(--mute);font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase}
.langsw{display:inline-flex;border:1px solid var(--faint);border-radius:9px;overflow:hidden;background:#fff}
.langbtn{border:none;background:transparent;color:var(--mute);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;padding:7px 14px;cursor:pointer;transition:background .15s,color .15s}
.langbtn+.langbtn{border-left:1px solid var(--faint)}
.langbtn:hover{background:#fafafa;color:var(--ink)}
.langbtn.on{background:var(--ink);color:var(--paper)}
.mcard{background:#fff;border:1px solid var(--faint);border-radius:12px;padding:16px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:transform .12s,border-color .12s}
.mcard:hover{transform:translateY(-1px);border-color:#d4d4d4}
.mico{width:38px;height:38px;border-radius:9px;background:#f4f4f2;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mico svg{width:18px;height:18px;stroke:var(--ink)}
.mtx{flex:1;min-width:0}
.mnm{font-size:14px;font-weight:700;color:var(--ink)}
.mdesc{font-size:11px;color:var(--mute);margin-top:1px}
.marr{color:var(--mute);flex-shrink:0}
.mcard:focus-visible,.hudot:focus-visible,.hnbtn:focus-visible,.hswap:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

/* ---------- MODULE ---------- */
#scr-module{background:#fff}
.mtbar{height:44px;display:flex;align-items:center;gap:11px;padding:0 13px;background:#0a0a0a;flex-shrink:0}
.mbck{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.85);padding:6px 11px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;position:relative}
.mbck::after{content:'';position:absolute;top:-8px;bottom:-8px;left:0;right:0}
.mtnm{font-size:11px;color:rgba(255,255,255,.7);font-family:'JetBrains Mono',monospace;letter-spacing:.1em}
.mfrm{flex:1;border:none;width:100%}

/* ---------- SHEET ---------- */
.sh{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:100}
.sh.open{display:flex}
.shc{background:var(--paper);width:100%;max-height:88vh;border-radius:18px 18px 0 0;padding:20px 18px 30px;overflow-y:auto;animation:up .28s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sht{font-size:17px;font-weight:700;color:var(--ink)}
.shclose{width:26px;height:26px;border-radius:50%;border:1px solid var(--faint);background:#fff;color:var(--mute);cursor:pointer;font-size:13px;line-height:1;position:relative}
.shclose::after{content:'';position:absolute;inset:-9px}
.fl{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.11em;text-transform:uppercase;color:var(--mute);display:block;margin-bottom:6px}
.fi{width:100%;padding:11px 12px;background:#fff;border:1px solid var(--faint);border-radius:9px;font-size:14px;font-family:'Space Grotesk',sans-serif;color:var(--ink);margin-bottom:14px}
.fi:focus{outline:none;border-color:var(--amber)}
.crow{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.csw{width:40px;height:40px;border-radius:9px;border:1px solid var(--faint);cursor:pointer;overflow:hidden;position:relative;flex-shrink:0}
.csw input{position:absolute;inset:-6px;width:150%;height:150%;border:none;padding:0;cursor:pointer}
.cpre{display:flex;gap:10px;flex-wrap:wrap;flex:1}
.cp{width:36px;height:36px;border-radius:7px;cursor:pointer;border:2px solid transparent;position:relative}
.cp::after{content:'';position:absolute;inset:-4px}
.cp.active{border-color:var(--ink)}
.bup{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.bprev{width:52px;height:52px;border-radius:10px;border:1px dashed var(--faint);background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.bprev img{width:100%;height:100%;object-fit:contain}
.bbtn{padding:9px 14px;background:#fff;border:1px solid var(--faint);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.btn{width:100%;padding:13px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;margin-top:4px}
.btp{background:var(--ink);color:var(--paper)}
.btg{background:#fff;border:1px solid var(--faint);color:var(--ink)}
.btd{background:#fff;border:1px solid var(--faint);color:var(--red);margin-top:10px}
.sec{border-top:1px solid var(--faint);margin:20px 0 16px;padding-top:16px}
.sect{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.11em;text-transform:uppercase;color:var(--mute);margin-bottom:10px}
.lrow{display:flex;align-items:center;gap:11px;padding:11px;background:#fff;border:1px solid var(--faint);border-radius:10px;margin-bottom:8px;cursor:pointer;position:relative}
.lrow.on{border-color:var(--ink);border-width:2px;padding:10px}
.lrow:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.ldot{width:30px;height:30px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ldot img{width:100%;height:100%;object-fit:contain}
.ldot span{font-size:10px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace}
.ltx{flex:1;min-width:0}
.lnm{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lsb{font-size:10px;color:var(--mute);font-family:'JetBrains Mono',monospace;margin-top:1px}
.ltag{font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;color:var(--green);flex-shrink:0}
.ledit{width:32px;height:32px;border-radius:7px;border:1px solid var(--faint);background:#fff;color:var(--mute);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;position:relative}
.ledit::after{content:'';position:absolute;inset:-6px}
.empty{text-align:center;padding:26px 14px;color:var(--mute);font-size:13px}
.toastEl{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88vw;text-align:center}
.toastEl.show{opacity:1}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
</style>
<script src="fluxgk-i18n.js"></script>
</head>
<body>

<div class="screen active" id="scr-loading"><div class="ldots"><i></i><i></i><i></i></div></div>

<div class="screen" id="scr-login">
  <div class="lwrap">
    <div class="llogo"><div class="lbrand">FluxGK</div><div class="lsub" data-i18n="hub.tagline">Data-Driven GK</div></div>
    <div class="lcard">
      <div class="lt" data-i18n="common.signIn">Sign in</div>
      <div class="lts" data-i18n="hub.loginSub">Goalkeeper Coach Platform</div>
      <div class="lf"><label class="ll" for="inp-email" data-i18n="common.email">Email</label><input class="li" id="inp-email" type="email" placeholder="coach@club.com" autocomplete="username"></div>
      <div class="lf"><label class="ll" for="inp-pass" data-i18n="common.password">Password</label><input class="li" id="inp-pass" type="password" placeholder="password" data-i18n-placeholder="hub.phPassword" autocomplete="current-password"></div>
      <label class="lrem"><input type="checkbox" id="inp-rem" checked><span data-i18n="hub.stayIn">Stay signed in</span></label>
      <div class="lerr" id="lerr" role="alert" aria-live="assertive"></div>
      <button class="lbtn" id="lbtn" onclick="doLogin()" data-i18n="common.signIn">Sign in</button>
    </div>
    <div class="lfooter" data-i18n="hub.footer">FluxGK · Data-Driven GK · v3.0</div>
  </div>
</div>

<div class="screen" id="scr-home">
  <div class="hnav" id="hnav">
    <div class="hbadge" id="hbadge"><span class="hbph" id="hbph">GK</span><img id="hbimg" src="" alt="Club badge" data-i18n-alt="hub.altBadge" style="display:none"></div>
    <div class="hct"><span class="hcname" id="hcname">FluxGK</span><span class="hcseas" id="hcseas">—</span></div>
    <div class="hnr">
      <button class="hswap" onclick="openSwitch()" aria-label="Switch club or season" data-i18n-aria="hub.ariaSwitch" data-i18n="hub.switch">SWITCH</button>
      <button class="hnbtn" onclick="openSettings()" title="Settings" aria-label="Open settings" data-i18n-title="common.settings" data-i18n-aria="hub.ariaOpenSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="hudot" id="hudot" onclick="openSettings()" role="button" tabindex="0" aria-label="Profile and settings" data-i18n-aria="hub.ariaProfile" onkeydown="kbAct(event,openSettings)">GK</div>
    </div>
  </div>
  <div class="hbody">
    <div class="hgreet" id="htime" data-i18n="hub.welcome">Welcome</div>
    <div class="hgsub"><span id="hcoach" data-i18n="common.coach">Coach</span> · <span id="hmeth">—</span></div>
    <div class="hstats">
      <div class="hst"><div class="hsv" id="st-sess">-</div><div class="hsl" data-i18n="hub.statSessions">Sessions</div></div>
      <div class="hst"><div class="hsv" id="st-match">-</div><div class="hsl" data-i18n="hub.statMatches">Matches</div></div>
      <div class="hst"><div class="hsv" id="st-gk">-</div><div class="hsl" data-i18n="hub.statKeepers">Keepers</div></div>
    </div>
    <div class="mgrid" id="mgrid"></div>
    <div class="langrow">
      <span class="langlbl" data-i18n="hub.language">Language</span>
      <div class="langsw" role="group" aria-label="Language / Idioma">
        <button type="button" class="langbtn" id="lang-en" onclick="setLang('en')">EN</button>
        <button type="button" class="langbtn" id="lang-pt" onclick="setLang('pt')">PT</button>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="scr-module">
  <div class="mtbar" id="mtbar">
    <button class="mbck" onclick="closeModule()" data-i18n="hub.backHub">‹ HUB</button>
    <span class="mtnm" id="mtnm"></span>
  </div>
  <iframe class="mfrm" id="mfrm" src="about:blank" sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-popups allow-downloads"></iframe>
</div>

<!-- SWITCH: clube + temporada -->
<div class="sh" id="sh-switch">
  <div class="shc">
    <div class="shh"><span class="sht" data-i18n="hub.clubSeason">Club &amp; Season</span><button class="shclose" onclick="closeSwitch()" aria-label="Close" data-i18n-aria="common.close">✕</button></div>
    <div class="sect" data-i18n="hub.clubs">Clubs</div>
    <div id="club-list"></div>
    <button class="btn btg" onclick="editClub(null)" data-i18n="hub.newClub">+ New club</button>
    <div class="sec"></div>
    <div class="sect" id="season-head" data-i18n="hub.seasons">Seasons</div>
    <div id="season-list"></div>
    <button class="btn btg" onclick="addSeason()" data-i18n="hub.newSeason">+ New season</button>
  </div>
</div>

<!-- EDITOR DE CLUBE -->
<div class="sh" id="sh-club">
  <div class="shc">
    <div class="shh"><span class="sht" id="club-title" data-i18n="hub.newClubTitle">New club</span><button class="shclose" onclick="closeClub()" aria-label="Close" data-i18n-aria="common.close">✕</button></div>
    <label class="fl" for="c-name" data-i18n="hub.clubName">Club name</label>
    <input class="fi" id="c-name" placeholder="Semey FC">
    <label class="fl" for="c-abbr" data-i18n="hub.abbr">Abbreviation</label>
    <input class="fi" id="c-abbr" placeholder="SEM" maxlength="4">
    <label class="fl" data-i18n="hub.clubColor">Club color</label>
    <div class="crow">
      <div class="csw" id="csw-prev"><input type="color" id="c-color" value="#0a0a0a" onchange="onColor(this.value)" oninput="onColor(this.value)" aria-label="Custom club color" data-i18n-aria="hub.ariaCustomColor"></div>
      <div class="cpre" id="cpre"></div>
    </div>
    <label class="fl" data-i18n="hub.badge">Badge</label>
    <div class="bup">
      <div class="bprev" id="c-bprev"><span style="font-size:10px;color:#a3a3a3">—</span></div>

    <div class="shh"><span class="sht" data-i18n="common.settings">Settings</span><button class="shclose" onclick="closeSettings()" aria-label="Close settings" data-i18n-aria="hub.ariaCloseSettings">✕</button></div>

  </div>
</div>

<div class="toastEl" id="toastEl" role="status" aria-live="polite"></div>

<script>
/* ============================================================
   >>>>>>>>>>  CONFIRA ESTA URL  <<<<<<<<<<
   Console do Firebase > fluxgksystem > Realtime Database.
   A URL aparece no topo da arvore de dados. Cole aqui exatamente.
   ============================================================ */
console.log('%c[FluxGK] hub v3.1 — clubes, temporadas (rename+delete)','color:#E8901A;font-weight:bold');
var DB_URL = "https://fluxgksystem-default-rtdb.firebaseio.com";

var FBC={
  apiKey:"AIzaSyAJcwMEwbpUvf2mrY9ej1xz6e0Ma_z65yY",
  authDomain:"fluxgksystem.firebaseapp.com",
  databaseURL:DB_URL,
  projectId:"fluxgksystem",
  storageBucket:"fluxgksystem.firebasestorage.app",
  messagingSenderId:"663122789948",
  appId:"1:663122789948:web:f5a8f9b19fc33870df6539"
};

var PRESETS=['#0a0a0a','#1e3a5f','#7c3aed','#0f6e56','#b91c1c','#c2410c','#1d4ed8','#0e7490','#374151','#713f12'];
/* n/d/t sao resolvidos por TX() a cada render, para trocar com o idioma */
var MODS=[
  {k:'planner',i:'<path d="M3 5h18M3 12h18M3 19h18"/>'},
  {k:'xg',     i:'<circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/>'},
  {k:'stats',  i:'<path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>'},
  {k:'minutes',i:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'},
  {k:'video',  i:'<rect x="2" y="5" width="15" height="14" rx="2"/><path d="M17 10l5-3v10l-5-3"/>'},
  {k:'data',   i:'<path d="M3 17l5-6 4 4 5-8 4 5"/>'}
];
function modName(k){return TX('hub.mod.'+k,k);}
function modDesc(k){return TX('hub.mod.'+k+'.d','');}
function modTag(k){return TX('hub.mod.'+k+'.t',k.toUpperCase());}
var MOD_FILES={xg:'mod_xg.html',planner:'mod_planner.html',data:'mod_data.html',stats:'mod_stats.html',minutes:'mod_minutes.html',video:'mod_video.html'};

var _auth,_rtdb;
var APP={
  uid:null,
  profile:{coachName:'',methodology:'Constraints-Led Approach'},
  clubs:{},          /* {id: {meta:{name,abbr,color}, badge:'', seasons:{id:{label}}}} */
  active:{clubId:null,seasonId:null},
  editingClub:null
};

/* ---------- helpers ---------- */
function U(p){return _rtdb.ref('users/'+APP.uid+(p?'/'+p:''));}
function club(){return APP.clubs[APP.active.clubId]||null;}
function season(){var c=club();if(!c||!c.seasons)return null;return c.seasons[APP.active.seasonId]||null;}
function dataPath(){
  if(!APP.active.clubId||!APP.active.seasonId)return null;
  return 'users/'+APP.uid+'/data/'+APP.active.clubId+'/'+APP.active.seasonId;
}
function slug(s){return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,28)||('c'+Date.now());}
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});var el=document.getElementById('scr-'+id);if(el)el.classList.add('active');if(id!=='module'){var fr=document.getElementById('mfrm');if(fr)fr.src='about:blank';}}
function kbAct(e,fn){if(e.key==='Enter'||e.key===' '||e.key==='Spacebar'){e.preventDefault();fn();}}
var _toastT=null;
function showToast(msg,ms){var el=document.getElementById('toastEl');el.textContent=msg;el.classList.add('show');if(_toastT)clearTimeout(_toastT);_toastT=setTimeout(function(){el.classList.remove('show');},ms||2500);}
function raceTimeout(p,ms){return new Promise(function(res){var done=false;var t=setTimeout(function(){if(!done){done=true;res('pending');}},ms);p.then(function(){if(!done){done=true;clearTimeout(t);res('saved');}}).catch(function(e){if(!done){done=true;clearTimeout(t);console.error('[FluxGK] write failed:',e);res('error');}});});}
function saveMsg(r){return r==='saved'?TX('hub.msg.saved'):r==='pending'?TX('hub.msg.savedOffline'):TX('hub.msg.saveFail');}

/* ---------- AUTH ---------- */
function doLogin(){
  var em=document.getElementById('inp-email').value.trim();
  var pw=document.getElementById('inp-pass').value;
  var rm=document.getElementById('inp-rem').checked;
  var er=document.getElementById('lerr');var bt=document.getElementById('lbtn');
  if(!em||!pw){er.textContent=TX('hub.msg.enterCreds');return;}
  er.textContent='';bt.disabled=true;bt.textContent=TX('hub.signingIn');
  var ps=rm?firebase.auth.Auth.Persistence.LOCAL:firebase.auth.Auth.Persistence.SESSION;
  _auth.setPersistence(ps).then(function(){return _auth.signInWithEmailAndPassword(em,pw);})
  .catch(function(e){bt.disabled=false;bt.textContent=TX('common.signIn');var m={'auth/user-not-found':TX('hub.msg.noAccount'),'auth/wrong-password':TX('hub.msg.wrongPass'),'auth/invalid-email':TX('hub.msg.invalidEmail'),'auth/too-many-requests':TX('hub.msg.tooMany'),'auth/invalid-credential':TX('hub.msg.invalidCred')};er.textContent=m[e.code]||e.message;});
}
document.getElementById('inp-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function doLogout(){closeSettings();_auth.signOut();APP.uid=null;showToast(TX('hub.msg.signedOut'));}

/* ---------- LOAD ---------- */
function withTimeout(p,ms,label){
  return Promise.race([
    p,
    new Promise(function(_,rej){setTimeout(function(){rej(new Error('TIMEOUT: '+label+' nao respondeu em '+ms+'ms'));},ms);})
  ]);
}
async function loadAll(){
  try{
    var snap=await withTimeout(U().get(),8000,'Realtime Database');
    var d=snap.val()||{};
    APP.profile=Object.assign({coachName:'',methodology:'Constraints-Led Approach'},d.profile||{});
    /* idioma salvo no perfil vale entre aparelhos (sem sobrescrever escolha local ja feita) */
    if(APP.profile.lang&&!localStorage.getItem('fluxgk_lang')) FluxGKI18n.setLang(APP.profile.lang);
    APP.clubs=d.clubs||{};
    APP.active=Object.assign({clubId:null,seasonId:null},d.active||{});
    /* se o clube/temporada ativos sumiram, escolhe o primeiro que existir */
    if(!APP.clubs[APP.active.clubId]){
      var ids=Object.keys(APP.clubs);
      APP.active.clubId=ids[0]||null;
      APP.active.seasonId=null;
    }
    var c=club();
    if(c&&(!c.seasons||!c.seasons[APP.active.seasonId])){
      var sids=Object.keys(c.seasons||{});
      APP.active.seasonId=sids[sids.length-1]||null;
    }
  }catch(e){
    console.error('[FluxGK] loadAll failed:',e);
    var msg=String(e.message||e);
    if(msg.indexOf('TIMEOUT')===0){
      showToast(TX('hub.msg.dbTimeout'),7000);
    }else if(msg.toLowerCase().indexOf('permission')>-1){
      showToast(TX('hub.msg.permission'),7000);
    }else{
      showToast(TX('hub.msg.loadFail'),6000);
    }
    /* o app ABRE mesmo assim, vazio, em vez de travar nas bolinhas */
  }
}

/* ---------- RENDER ---------- */
function applyIdentity(){
  var c=club(),s=season();
  var color=(c&&c.meta&&c.meta.color)||'#0a0a0a';
  document.getElementById('hnav').style.background=color;
  document.getElementById('mtbar').style.background=color;
  var ph=document.getElementById('hbph'),img=document.getElementById('hbimg');
  if(c&&c.badge){img.src=c.badge;img.style.display='block';ph.style.display='none';}
  else{img.style.display='none';ph.style.display='block';ph.textContent=(c&&c.meta&&(c.meta.abbr||c.meta.name)||'GK').slice(0,2).toUpperCase();}
  document.getElementById('hcname').textContent=(c&&c.meta&&c.meta.name)||TX('hub.noClub');
  document.getElementById('hcseas').textContent=(s&&s.label)||TX('hub.noSeason');
  document.getElementById('hcoach').textContent=(APP.profile.coachName||TX('common.coach')).split(' ')[0];
  document.getElementById('hmeth').textContent=APP.profile.methodology||'—';
  document.getElementById('hudot').textContent=(APP.profile.coachName||'GK').slice(0,2).toUpperCase();
  var h=new Date().getHours();
  document.getElementById('htime').textContent=h<12?TX('hub.morning'):h<18?TX('hub.afternoon'):TX('hub.evening');
}
function renderMods(){
  var g=document.getElementById('mgrid');g.innerHTML='';
  MODS.forEach(function(m){
    var d=document.createElement('div');
    d.className='mcard';d.setAttribute('role','button');d.setAttribute('tabindex','0');
    d.setAttribute('aria-label',TX('hub.ariaOpen')+modName(m.k));
    d.onclick=function(){openModule(m.k);};
    d.onkeydown=function(e){kbAct(e,function(){openModule(m.k);});};
    d.innerHTML='<div class="mico"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+m.i+'</svg></div>'
      +'<div class="mtx"><div class="mnm">'+modName(m.k)+'</div><div class="mdesc">'+modDesc(m.k)+'</div></div>'
      +'<span class="marr">›</span>';
    g.appendChild(d);
  });
}
function loadStats(){
  var p=dataPath();
  ['st-sess','st-match','st-gk'].forEach(function(i){document.getElementById(i).textContent=p?'-':'0';});
  if(!p)return;
  _rtdb.ref(p+'/planner/sessions').get().then(function(s){document.getElementById('st-sess').textContent=s.exists()?Object.keys(s.val()).length:0;}).catch(function(e){console.error(e);});
  _rtdb.ref(p+'/xg/games').get().then(function(s){document.getElementById('st-match').textContent=s.exists()?Object.keys(s.val()).length:0;}).catch(function(e){console.error(e);});
  _rtdb.ref(p+'/roster').get().then(function(s){document.getElementById('st-gk').textContent=s.exists()?Object.keys(s.val()).length:0;}).catch(function(e){console.error(e);});
}
function refresh(){applyIdentity();loadStats();}

/* ---------- IDIOMA (EN / PT) ---------- */
function markLangButtons(){
  var l=FluxGKI18n.getLang();
  ['en','pt'].forEach(function(x){
    var b=document.getElementById('lang-'+x);
    if(b){ b.classList.toggle('on',x===l); b.setAttribute('aria-pressed',x===l?'true':'false'); }
  });
}
function setLang(l){
  FluxGKI18n.setLang(l);                 /* persiste + re-aplica data-i18n */
  markLangButtons();
  renderMods();                          /* cards dependem de TX() */
  applyIdentity();                       /* saudacao e nome do treinador */
  try{ renderSwitch(); }catch(e){}       /* painel de clubes, se aberto */
  /* guarda no perfil para acompanhar o usuario em outros aparelhos */
  if(APP.uid&&_rtdb){ APP.profile.lang=l; U('profile/lang').set(l).catch(function(){}); }
  /* modulo aberto recebe o novo idioma na hora */
  var fr=document.getElementById('mfrm');
  if(fr&&fr.src&&fr.src.indexOf('about:blank')===-1) pushContext(fr.contentWindow);
  var mt=document.getElementById('mtnm');
  if(mt&&mt.dataset&&mt.dataset.modkey) mt.textContent=modTag(mt.dataset.modkey);
}

/* ---------- SWITCH (clube + temporada) ---------- */
function openSwitch(){renderSwitch();document.getElementById('sh-switch').classList.add('open');}
function closeSwitch(){document.getElementById('sh-switch').classList.remove('open');}
function renderSwitch(){
  var cl=document.getElementById('club-list');cl.innerHTML='';
  var ids=Object.keys(APP.clubs);
  if(!ids.length){cl.innerHTML='<div class="empty">No clubs yet. Create your first one below.</div>';}
  ids.forEach(function(id){
    var c=APP.clubs[id],m=c.meta||{};
    var r=document.createElement('div');
    r.className='lrow'+(id===APP.active.clubId?' on':'');
    r.setAttribute('role','button');r.setAttribute('tabindex','0');
    r.setAttribute('aria-label',TX('hub.ariaSelect')+(m.name||id));
    var badge=c.badge?'<img src="'+c.badge+'" alt="">':'<span>'+((m.abbr||m.name||'--').slice(0,2).toUpperCase())+'</span>';
    var ns=Object.keys(c.seasons||{}).length;
    r.innerHTML='<div class="ldot" style="background:'+(m.color||'#0a0a0a')+'">'+badge+'</div>'
      +'<div class="ltx"><div class="lnm">'+(m.name||id)+'</div><div class="lsb">'+ns+' season'+(ns===1?'':'s')+'</div></div>'
      +(id===APP.active.clubId?'<span class="ltag">ACTIVE</span>':'')
      +'<button class="ledit" aria-label="'+TX('hub.ariaEdit')+(m.name||id)+'">✎</button>';
    r.querySelector('.ledit').onclick=function(e){e.stopPropagation();editClub(id);};
    var pick=function(){selectClub(id);};
    r.onclick=pick;r.onkeydown=function(e){kbAct(e,pick);};
    cl.appendChild(r);
  });

  var sl=document.getElementById('season-list');sl.innerHTML='';
  var c=club();
  document.getElementById('season-head').textContent=c?(TX('hub.seasonsOf')+(c.meta&&c.meta.name||'')):TX('hub.seasons');
  if(!c){sl.innerHTML='<div class="empty">Select a club first.</div>';return;}
  var sids=Object.keys(c.seasons||{});
  if(!sids.length){sl.innerHTML='<div class="empty">No seasons yet.</div>';}
  sids.forEach(function(sid){
    var s=c.seasons[sid];
    var r=document.createElement('div');
    r.className='lrow'+(sid===APP.active.seasonId?' on':'');
    r.setAttribute('role','button');r.setAttribute('tabindex','0');
    r.setAttribute('aria-label',TX('hub.ariaSelectSeason')+(s.label||sid));
    r.innerHTML='<div class="ldot" style="background:#f4f4f2"><span style="color:#0a0a0a">'+(s.label||sid).slice(0,2)+'</span></div>'
      +'<div class="ltx"><div class="lnm">'+(s.label||sid)+'</div></div>'
      +(sid===APP.active.seasonId?'<span class="ltag">ACTIVE</span>':'')
      +'<button class="ledit" aria-label="'+TX('hub.ariaRenameSeason')+(s.label||sid)+'">\u270E</button>'
      +'<button class="ledit" aria-label="'+TX('hub.ariaDeleteSeason')+(s.label||sid)+'" style="color:#dc2626">\u2715</button>';
    var btns=r.querySelectorAll('.ledit');
    btns[0].onclick=function(e){e.stopPropagation();renameSeason(sid);};
    btns[1].onclick=function(e){e.stopPropagation();deleteSeason(sid);};
    var pick=function(){selectSeason(sid);};
    r.onclick=pick;r.onkeydown=function(e){kbAct(e,pick);};
    sl.appendChild(r);
  });
}
async function selectClub(id){
  APP.active.clubId=id;
  var c=APP.clubs[id];
  var sids=Object.keys((c&&c.seasons)||{});
  APP.active.seasonId=sids[sids.length-1]||null;
  await U('active').set(APP.active);
  refresh();renderSwitch();
}
async function selectSeason(sid){
  APP.active.seasonId=sid;
  await U('active').set(APP.active);
  refresh();renderSwitch();
  closeSwitch();
  showToast(TX('hub.msg.switchedTo')+((season()||{}).label||sid));
}
async function addSeason(){
  var c=club();
  if(!c){showToast(TX('hub.msg.clubFirst'));return;}
  var y=new Date().getFullYear();
  var label=prompt(TX('hub.seasonLabel'),y+'/'+String(y+1).slice(2));
  if(!label)return;
  var sid=slug(label);
  var r=await raceTimeout(U('clubs/'+APP.active.clubId+'/seasons/'+sid).set({label:label,createdAt:Date.now()}),4000);
  if(r==='error'){showToast(saveMsg(r));return;}
  c.seasons=c.seasons||{};c.seasons[sid]={label:label};
  await selectSeason(sid);
  renderSwitch();
}

async function renameSeason(sid){
  var c=club();if(!c||!c.seasons||!c.seasons[sid])return;
  var cur=c.seasons[sid].label||sid;
  var nl=prompt(TX('hub.seasonLabel'),cur);
  if(!nl||nl===cur)return;
  var r=await raceTimeout(U('clubs/'+APP.active.clubId+'/seasons/'+sid+'/label').set(nl),4000);
  if(r==='error'){showToast(saveMsg(r));return;}
  c.seasons[sid].label=nl;
  showToast(TX('hub.msg.seasonRenamed'));
  refresh();renderSwitch();
}
async function deleteSeason(sid){
  var c=club();if(!c||!c.seasons||!c.seasons[sid])return;
  var lb=c.seasons[sid].label||sid;
  var cid=APP.active.clubId;
  /* checa se a temporada tem dados antes de avisar */
  var hasData=false;
  try{
    var snap=await withTimeout(_rtdb.ref('users/'+APP.uid+'/data/'+cid+'/'+sid).get(),5000,'data check');
    hasData=snap.exists();
  }catch(e){console.error(e);}
  var msg=hasData
    ? TX('hub.msg.deleteSeason')+lb+TX('hub.msg.delSeasonData')
    : TX('hub.msg.deleteSeason')+lb+TX('hub.msg.delSeasonEmpty');
  if(!confirm(msg))return;
  await U('clubs/'+cid+'/seasons/'+sid).remove();
  await _rtdb.ref('users/'+APP.uid+'/data/'+cid+'/'+sid).remove();
  delete c.seasons[sid];
  if(APP.active.seasonId===sid){
    var left=Object.keys(c.seasons||{});
    APP.active.seasonId=left[left.length-1]||null;
    await U('active').set(APP.active);
  }
  showToast(TX('hub.msg.seasonDeleted'));
  refresh();renderSwitch();
}

/* ---------- EDITOR DE CLUBE ---------- */
function editClub(id){
  APP.editingClub=id;
  var c=id?APP.clubs[id]:null,m=(c&&c.meta)||{};
  document.getElementById('club-title').textContent=id?TX('hub.editClubTitle'):TX('hub.newClubTitle');
  document.getElementById('c-name').value=m.name||'';
  document.getElementById('c-abbr').value=m.abbr||'';
  document.getElementById('c-color').value=m.color||'#0a0a0a';
  document.getElementById('csw-prev').style.background=m.color||'#0a0a0a';
  var bp=document.getElementById('c-bprev');
  bp.innerHTML=(c&&c.badge)?'<img src="'+c.badge+'" alt="Club badge">':'<span style="font-size:10px;color:#a3a3a3">—</span>';
  bp.dataset.badge=(c&&c.badge)||'';
  document.getElementById('c-del').style.display=id?'block':'none';
  renderPresets(m.color||'#0a0a0a');
  closeSwitch();
  document.getElementById('sh-club').classList.add('open');
}
function closeClub(){document.getElementById('sh-club').classList.remove('open');openSwitch();}
function renderPresets(cur){
  var pc=document.getElementById('cpre');pc.innerHTML='';
  PRESETS.forEach(function(c){
    var d=document.createElement('div');
    d.className='cp'+(c===cur?' active':'');
    d.style.background=c;
    d.setAttribute('role','button');d.setAttribute('tabindex','0');
    d.setAttribute('aria-label',TX('hub.ariaColor')+c);
    var pick=function(){onColor(c);};
    d.onclick=pick;d.onkeydown=function(e){kbAct(e,pick);};
    pc.appendChild(d);
  });
}
function onColor(c){
  document.getElementById('c-color').value=c;
  document.getElementById('csw-prev').style.background=c;
  renderPresets(c);
}
function onBadge(inp){
  var f=inp.files[0];if(!f)return;
  if(f.size>500*1024){showToast(TX('hub.msg.badgeTooLarge'));inp.value='';return;}
  var r=new FileReader();
  r.onload=function(e){
    var bp=document.getElementById('c-bprev');
    bp.innerHTML='<img src="'+e.target.result+'" alt="Club badge">';
    bp.dataset.badge=e.target.result;
  };
  r.readAsDataURL(f);
}
async function saveClub(){
  var name=document.getElementById('c-name').value.trim();
  if(!name){showToast(TX('hub.msg.clubNameRequired'));return;}
  var id=APP.editingClub||slug(name);
  var meta={
    name:name,
    abbr:(document.getElementById('c-abbr').value.trim()||name.slice(0,3)).toUpperCase(),
    color:document.getElementById('c-color').value
  };
  var badge=document.getElementById('c-bprev').dataset.badge||'';
  showToast(TX('common.saving'),8000);
  var r=await raceTimeout(U('clubs/'+id+'/meta').set(meta),4000);
  if(badge)await U('clubs/'+id+'/badge').set(badge);
  APP.clubs[id]=APP.clubs[id]||{};
  APP.clubs[id].meta=meta;
  if(badge)APP.clubs[id].badge=badge;
  showToast(saveMsg(r));
  if(r==='error')return;
  /* primeiro clube: vira ativo e ganha uma temporada */
  if(!APP.active.clubId){
    APP.active.clubId=id;
    await U('active').set(APP.active);
  }
  document.getElementById('sh-club').classList.remove('open');
  refresh();
  var c=APP.clubs[id];
  if(!c.seasons||!Object.keys(c.seasons).length){
    APP.active.clubId=id;
    await addSeason();
  }else{
    openSwitch();
  }
}
async function deleteClub(){
  var id=APP.editingClub;if(!id)return;
  var c=APP.clubs[id],nm=(c.meta&&c.meta.name)||id;
  if(!confirm(TX('hub.msg.deleteClub')+nm+TX('hub.msg.delClubWarn')))return;
  await U('clubs/'+id).remove();
  await U('data/'+id).remove();
  delete APP.clubs[id];
  if(APP.active.clubId===id){
    var ids=Object.keys(APP.clubs);
    APP.active.clubId=ids[0]||null;
    APP.active.seasonId=null;
    var nc=club();
    if(nc&&nc.seasons)APP.active.seasonId=Object.keys(nc.seasons)[0]||null;
    await U('active').set(APP.active);
  }
  document.getElementById('sh-club').classList.remove('open');
  showToast(TX('hub.msg.clubDeleted'));
  refresh();openSwitch();
}

/* ---------- SETTINGS (perfil) ---------- */
function openSettings(){
  document.getElementById('s-coach').value=APP.profile.coachName||'';
  document.getElementById('s-meth').value=APP.profile.methodology||'';
  document.getElementById('sh-set').classList.add('open');
}
function closeSettings(){document.getElementById('sh-set').classList.remove('open');}
async function saveSettings(){
  APP.profile.coachName=document.getElementById('s-coach').value.trim();
  APP.profile.methodology=document.getElementById('s-meth').value.trim();
  closeSettings();
  showToast(TX('common.saving'),8000);
  var r=await raceTimeout(U('profile').set(APP.profile),4000);
  showToast(saveMsg(r));
  refresh();
  var fr=document.getElementById('mfrm');
  if(fr&&fr.src&&fr.src.indexOf('about:blank')===-1)pushContext(fr.contentWindow);
}

/* ---------- MODULOS ---------- */
function ctxPayload(){
  var c=club()||{},m=c.meta||{},s=season()||{};
  return {
    type:'FLUXGK_CONTEXT',
    uid:APP.uid,
    firebaseConfig:FBC,
    dataPath:dataPath(),                     /* onde o modulo grava */
    lang:FluxGKI18n.getLang(),               /* idioma escolhido no hub */
    club:{id:APP.active.clubId,name:m.name||'',abbr:m.abbr||'',color:m.color||'#0a0a0a',badge:c.badge||''},
    season:{id:APP.active.seasonId,label:s.label||''},
    coach:{name:APP.profile.coachName||'',methodology:APP.profile.methodology||''},
    /* formato ANTIGO — mantido para os modulos ainda nao migrados nao quebrarem */
    profile:{
      coachName:APP.profile.coachName||'',
      clubName:m.name||'',
      clubColor:m.color||'#0a0a0a',
      clubBadge:c.badge||'',
      methodology:APP.profile.methodology||'',
      seasonLabel:s.label||''
    }
  };
}
function pushContext(win){
  if(!win)return;
  try{win.postMessage(ctxPayload(),'*');}catch(e){console.error('[FluxGK] pushContext failed:',e);}
}
window.addEventListener('message',function(e){
  if(!e.data)return;
  if(e.data.type==='FLUXGK_STAT_UPDATE')loadStats();
  if(e.data.type==='FLUXGK_MODULE_READY')pushContext(e.source);
});
function openModule(key){
  if(!dataPath()){showToast(TX('hub.msg.clubSeasonFirst'));openSwitch();return;}
  var m=MODS.filter(function(x){return x.k===key;})[0];
  var mtEl=document.getElementById('mtnm');
  mtEl.textContent=modTag(key); mtEl.dataset.modkey=key;
  document.getElementById('mtbar').style.background=(club()&&club().meta&&club().meta.color)||'#0a0a0a';
  var fr=document.getElementById('mfrm');
  fr.onload=function(){
    if(fr.src==='about:blank')return;
    setTimeout(function(){pushContext(fr.contentWindow);},600);  /* rede de seguranca */
  };
  fr.src=MOD_FILES[key];
  showScreen('module');
}
function closeModule(){showScreen('home');loadStats();}

/* ---------- BOOT ---------- */
function ldScript(src){return new Promise(function(res,rej){var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function boot(){
  try{
    await ldScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
    await Promise.all([
      ldScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js'),
      ldScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js')
    ]);
    firebase.initializeApp(FBC);
    _auth=firebase.auth();
    _rtdb=firebase.database();
    _auth.onAuthStateChanged(async function(u){
      if(u){
        APP.uid=u.uid;
        await loadAll();
        markLangButtons();
        renderMods();
        refresh();
        showScreen('home');
        if(!Object.keys(APP.clubs).length){
          showToast(TX('hub.msg.welcomeNew'),5000);
          openSwitch();
        }
      }else{
        document.getElementById('lbtn').disabled=false;
        document.getElementById('lbtn').textContent=TX('common.signIn');
        showScreen('login');
      }
    });
  }catch(e){
    console.error('[FluxGK] boot failed:',e);
    document.getElementById('scr-loading').innerHTML='<div style="color:#f87171;font-family:monospace;font-size:13px;text-align:center;padding:20px">'+TX('hub.msg.loadFailBoot')+'</div>';
  }
}
boot();
</script>
